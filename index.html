        // Static references provided in the prompt
        const SAFETY_REF = {
          section: "4.1 PPE Requirements - Welding Operations",
          requirement:
            "Workers must wear safety glasses with side shields and face shields during welding operations. Additional protection such as full-face shields or welding goggles must be worn when working beneath or around overhead welding operations.",
        };

        const CAUSAL_DEFS = {
          people_factors: [
            "Personal Protective Equipment not used or used improperly",
            "Violation intentional (by individual or group)",
            "Violation unintentional (by individual or group)",
            "Improper position (in the line of fire)",
            "Work or motion at improper speed",
            "Improper lifting or loading",
            "Servicing of energized equipment/inadequate energy isolation",
            "Failure to warn of hazard",
            "Inadequate use of safety systems",
            "Equipment or materials not secured",
            "Disabled or removed guards, warning systems or safety devices",
            "Improper decision making or lack of judgement",
            "Lack of attention/distracted by other concerns/stress",
            "Acts of violence",
            "Use of drugs or alcohol",
            "Fatigue",
            "Overexertion or improper position/posture for task",
            "Improper use/position of tools/equipment/materials/products",
          ],
          process_factors: [
            "Inadequate/defective guards or protective barriers",
            "Inadequate/defective Personal Protective Equipment",
            "Inadequate/defective warning systems/safety devices",
            "Inadequate security provisions or systems",
            "Inadequate design/specification/management of change",
            "Inadequate/defective tools/equipment/materials/products",
            "Inadequate maintenance/inspection/testing",
            "Congestion, clutter or restricted motion",
            "Inadequate surfaces, floors, walkways or roads",
            "Hazardous atmosphere (explosive/toxic/asphyxiant)",
            "Storms or acts of nature",
            "Inadequate work standards/procedures",
            "Inadequate hazard identification or risk assessment",
            "Inadequate communication",
            "Inadequate supervision",
            "Poor leadership/organizational culture",
            "Failure to report/learn from events",
            "Inadequate training/competence",
          ],
        };

        function sanitize(str) {
          if (str == null) return "";
          return String(str)
            .replace(/\uFFFD/g, "") // remove � from bad encodings
            .replace(/â€™/g, "'")
            .replace(/â€/g, "-")
            .replace(/\s+/g, " ")
            .trim();
        }

        function parseRaw(raw) {
          const lines = raw.split(/\r?\n/).filter((l) => l.trim().length > 0);
          if (lines.length === 0) return [];
          const header = lines[0].split(/\t+/).map((h) => sanitize(h));
          const idx = Object.fromEntries(header.map((h, i) => [h.toLowerCase(), i]));

          const records = [];
          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(/\t+/).map((c) => sanitize(c));

            // Guard: skip if not enough columns
            if (cols.length < header.length - 2) continue;

            const get = (name) => cols[idx[name] ?? -1] ?? "";

            const date = get("date");
            const summary = get("summary");
            const injury = get("injury");
            const department = get("department");
            const ppe = get("ppe");
            const objectInvolved = get("object");

            const base = {
              incident_data: {
                date,
                summary,
                injury_incident_type: injury || "",
                department,
                ppe_used: ppe?.toLowerCase?.() || "",
                object_involved: objectInvolved,
              },
              safety_manual_reference: { ...SAFETY_REF },
              causal_factor_definitions: { ...CAUSAL_DEFS },
              analysis: {
                identified_people_factors: [],
                identified_process_factors: [],
                reasoning: "",
              },
              meta: {
                incident: get("incident"),
                type: get("type"),
                potential_claim: get("potential claim?"),
                report_id: get("reportid"),
                lost_days: get("# lost days"),
                restricted_days: get("# restricted days"),
              },
            };

            records.push(base);
          }
          return records;
        }

        function DownloadButton({ data }) {
          const onClick = () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `incidents_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          };
          return (
            <button onClick={onClick} className="px-4 py-2 rounded-2xl shadow font-medium border hover:shadow-md">
              Export JSON
            </button>
          );
        }

        function Pill({ children }) {
          return (
            <span className="text-xs px-2 py-1 rounded-full border bg-white/60">
              {children}
            </span>
          );
        }

        function IncidentJsonBuilder() {
          const [q, setQ] = useState("");
          const [dept, setDept] = useState("All");
          const [type, setType] = useState("All");
          const [ppe, setPpe] = useState("All");

          const data = useMemo(() => parseRaw(RAW), []);

          const departments = useMemo(() => {
            const set = new Set(data.map((d) => d.incident_data.department || "Unknown"));
            return ["All", ...Array.from(set).sort()];
          }, [data]);

          const types = useMemo(() => {
            const set = new Set(data.map((d) => (d.meta.incident || "").trim() || "Unknown"));
            return ["All", ...Array.from(set).sort()];
          }, [data]);

          const ppeOptions = ["All", "yes", "no", "(blank)"];

          const filtered = useMemo(() => {
            return data.filter((d) => {
              const hay = (
                `${d.incident_data.summary} ${d.incident_data.injury_incident_type} ${d.incident_data.department} ${d.meta.report_id}`
              )
                .toLowerCase()
                .trim();
              const matchesQ = q.trim() === "" || hay.includes(q.toLowerCase());
              const matchesDept = dept === "All" || (d.incident_data.department || "Unknown") === dept;
              const matchesType = type === "All" || (d.meta.incident || "Unknown") === type;
              const ppeVal = (d.incident_data.ppe_used || "").toLowerCase();
              const matchesPpe =
                ppe === "All" ||
                (ppe === "(blank)" ? ppeVal === "" : ppeVal === ppe.toLowerCase());
              return matchesQ && matchesDept && matchesType && matchesPpe;
            });
          }, [data, q, dept, type, ppe]);

          return (
            <div className="min-h-screen w-full bg-gradient-to-b from-slate-50 to-white text-slate-800">
              <div className="max-w-7xl mx-auto px-4 py-8">
                <header className="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                  <div>
                    <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight">Incident JSON Builder & Viewer</h1>
                    <p className="text-sm text-slate-500 mt-1">Parses your tab-delimited rows into the requested JSON structure and lets you search, filter, and export.</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <DownloadButton data={filtered} />
                  </div>
                </header>

                <section className="mt-6 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
                  <div className="flex flex-col gap-1">
                    <label className="text-xs uppercase tracking-wide text-slate-500">Search</label>
                    <input
                      value={q}
                      onChange={(e) => setQ(e.target.value)}
                      placeholder="summary, injury type, department, report id..."
                      className="border rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-300"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-xs uppercase tracking-wide text-slate-500">Department</label>
                    <select value={dept} onChange={(e) => setDept(e.target.value)} className="border rounded-xl px-3 py-2">
                      {departments.map((d) => (
                        <option key={d} value={d}>
                          {d}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-xs uppercase tracking-wide text-slate-500">Incident</label>
                    <select value={type} onChange={(e) => setType(e.target.value)} className="border rounded-xl px-3 py-2">
                      {types.map((t) => (
                        <option key={t} value={t}>
                          {t}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-xs uppercase tracking-wide text-slate-500">PPE Used</label>
                    <select value={ppe} onChange={(e) => setPpe(e.target.value)} className="border rounded-xl px-3 py-2">
                      {ppeOptions.map((t) => (
                        <option key={t} value={t}>
                          {t}
                        </option>
                      ))}
                    </select>
                  </div>
                </section>

                <p className="mt-4 text-sm text-slate-500">Showing <span className="font-semibold text-slate-700">{filtered.length}</span> of {data.length} records</p>

                <main className="mt-4 grid gap-4">
                  {filtered.map((item, idx) => (
                    <article key={item.meta.report_id || idx} className="border rounded-2xl p-4 bg-white shadow-sm">
                      <div className="flex items-start justify-between gap-4">
                        <div className="space-y-1">
                          <h2 className="text-base font-semibold">{item.incident_data.summary || "(no summary)"}</h2>
                          <div className="flex flex-wrap gap-2 text-slate-600">
                            <Pill>{item.incident_data.date || "(no date)"}</Pill>
                            <Pill>{item.incident_data.department || "Unknown Dept"}</Pill>
                            <Pill>{item.meta.incident || "Incident"}</Pill>
                            {item.incident_data.injury_incident_type && (
                              <Pill>{item.incident_data.injury_incident_type}</Pill>
                            )}
                            {item.incident_data.ppe_used !== "" && (
                              <Pill>PPE: {item.incident_data.ppe_used}</Pill>
                            )}
                            {item.meta.potential_claim && (
                              <Pill>Potential Claim: {item.meta.potential_claim}</Pill>
                            )}
                            {item.meta.report_id && <Pill>Report #{item.meta.report_id}</Pill>}
                          </div>
                        </div>
                      </div>

                      <details className="mt-3">
                        <summary className="cursor-pointer text-sm text-slate-600 hover:text-slate-800">View JSON</summary>
                        <pre className="mt-2 text-xs overflow-x-auto bg-slate-50 border rounded-xl p-3">
{JSON.stringify({
  incident_data: item.incident_data,
  safety_manual_reference: item.safety_manual_reference,
  causal_factor_definitions: item.causal_factor_definitions,
  analysis: item.analysis,
}, null, 2)}
                        </pre>
                      </details>
                    </article>
                  ))}
                </main>

                <footer className="mt-10 border-t pt-6 text-xs text-slate-500">
                  This UI includes the static safety manual reference and causal factor definitions inside each JSON record, as requested.
                </footer>
              </div>
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IncidentJsonBuilder />);
    </script>
